[tool.ruff]
# Set the maximum line length to 88 (standard Black/Ruff formatting)
line-length = 88

# Define the minimum Python version you want to support
target-version = "py38"

[tool.ruff.lint]
# Select the rules you want to enforce:
# E   - pycodestyle errors
# W   - pycodestyle warnings
# F   - pyflakes
# I   - isort (sorts your imports automatically)
# UP  - pyupgrade (upgrades syntax to newer Python versions)
# B   - flake8-bugbear (finds likely bugs and design problems)
select = ["E", "W", "F", "I", "UP", "B"]

# Ignore specific rules if needed
ignore = []

# Allow autofix for all enabled rules (when `--fix` is passed)
fixable = ["ALL"]
unfixable = []